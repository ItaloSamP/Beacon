<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000033"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="12"/>
  <g transform="translate(400,225)">
    <!-- Beacon icon -- a lighthouse-inspired shape -->
    <polygon points="0,-80 -50,80 50,80" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
    <circle cx="0" cy="0" r="8" fill="#ffffff" opacity="0.9"/>
    <line x1="0" y1="-8" x2="0" y2="-60" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <line x1="0" y1="-60" x2="-30" y2="-80" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="-60" x2="30" y2="-80" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <!-- Signal waves -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.25"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#ffffff" stroke-width="0.75" opacity="0.15"/>
  </g>
  <text x="400" y="380" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="14" opacity="0.6">
    Dashboard Screenshot — Coming Soon
  </text>
</svg>
