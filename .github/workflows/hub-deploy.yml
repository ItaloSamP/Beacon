name: Deploy Quality Hub to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'hub/**'
  workflow_dispatch:
  schedule:
    # Rebuild every 6 hours to keep data fresh
    - cron: '0 */6 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Generate reports.json (placeholder)
        run: |
          # In production, this step would run the reports aggregator (#25)
          # to generate real data. For now, keep existing reports.json as source.
          if [ ! -f hub/reports.json ]; then
            echo '{"generated_at":"","commit":"","branch":"","components":{},"coverage_trend":[],"security_issues":[],"test_failures":[],"lint_warnings":[],"history":[]}' > hub/reports.json
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./hub
          destination_dir: hub
          keep_files: true
          enable_jekyll: false
          force_orphan: false
