name: Docker Build & Push

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.opencode/**'
      - 'docs/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend, agent]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repository owner (GHCR requires lowercase)
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.component }} image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.component }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/beacon-${{ matrix.component }}:latest
            ghcr.io/${{ env.OWNER_LC }}/beacon-${{ matrix.component }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build report
        run: |
          echo "### ${{ matrix.component }} image" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ env.OWNER_LC }}/beacon-${{ matrix.component }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ env.OWNER_LC }}/beacon-${{ matrix.component }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  build-report:
    name: Build report
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    steps:
      - name: Lowercase repository owner
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Summary
        run: |
          if [ "${{ needs.build-and-push.result }}" = "success" ]; then
            echo "# Docker Build & Push :white_check_mark:" >> $GITHUB_STEP_SUMMARY
            echo "All images built and pushed to **ghcr.io/${{ env.OWNER_LC }}**." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Component | Latest Tag | SHA Tag |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|-----------|---------|" >> $GITHUB_STEP_SUMMARY
            for component in backend frontend agent; do
              echo "| $component | \`ghcr.io/${{ env.OWNER_LC }}/beacon-$component:latest\` | \`ghcr.io/${{ env.OWNER_LC }}/beacon-$component:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "# Docker Build & Push :x:" >> $GITHUB_STEP_SUMMARY
            echo "One or more image builds failed. Check the individual job logs above." >> $GITHUB_STEP_SUMMARY
          fi
