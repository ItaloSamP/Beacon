name: Backend CI

on:
  push:
    paths:
      - 'app/**'
      - 'tests/**'
      - 'alembic/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'tests/**'
      - 'alembic/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/backend-ci.yml'
  schedule:
    - cron: '0 6 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: beacon_user
          POSTGRES_PASSWORD: beacon_pass
          POSTGRES_DB: beacon_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://beacon_user:beacon_pass@localhost:5432/beacon_db

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U beacon_user -d beacon_db; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Ruff lint
        run: python -m ruff check .

      - name: Mypy type-check
        run: python -m mypy app/

      - name: Pytest with coverage
        continue-on-error: true
        run: python -m pytest --cov=app --cov-report=xml --cov-report=term --cov-fail-under=60

      - name: Bandit security scan
        run: python -m bandit -r app/ -ll

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 7
