name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'scripts/generate_docs.py'
      - 'PROJECT_CONTEXT.md'
      - '.opencode/work/docs/**'
      - '.opencode/work/tasks/task-sprint-*.md'
      - '.github/workflows/docs-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'scripts/generate_docs.py'
      - 'PROJECT_CONTEXT.md'
      - '.opencode/work/docs/**'
      - '.opencode/work/tasks/task-sprint-*.md'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build MkDocs Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material==9.6.*
          pip install mkdocs-minify-plugin

      - name: Generate docs
        run: |
          python scripts/generate_docs.py --verbose

      - name: Build site
        run: |
          mkdocs build --strict

      - name: Deploy to GitHub Pages (root /)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: .
          keep_files: true
          force_orphan: false
          enable_jekyll: false
          commit_message: 'docs: deploy documentation hub [skip ci]'
