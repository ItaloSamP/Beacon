# Development override with bind mounts for hot-reload.
# This file is automatically merged with docker-compose.yml by Docker Compose.
# Explicitly lists all dev bind mounts for clarity and customization.
#
# To customize ports or other settings, copy and modify values here.

services:
  backend:
    volumes:
      - ./app:/app/app
      - ./agent:/app/agent
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./scripts:/app/scripts
      - beacon_token:/run/beacon

  frontend:
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - frontend_node_modules:/app/node_modules

  agent:
    volumes:
      - ./agent:/app/agent
      - beacon_token:/run/beacon:ro
      - agent_data:/app/data
